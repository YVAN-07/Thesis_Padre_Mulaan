                          appearance USE three_d_printed
                          geometry DEF Lower_Arm Mesh {
                            url "assets/Lower_Arm.stl"
                          }
                        }
                        Shape {
                          appearance USE sts3215
                          geometry DEF Lower_Arm_Motor Mesh {
                            url "assets/Lower_Arm_Motor.stl"
                          }
                        }
                        
                        HingeJoint {
                          jointParameters HingeJointParameters {
                            anchor 0.000000 0.005200 0.134900
