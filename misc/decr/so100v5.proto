                                        url "assets/Fixed_Jaw_Motor.stl"
                                      }
                                    }
                                    
                                    Camera {
                                      name "gripper_camera"
                                      width 224
                                      height 224
                                      fieldOfView 1.0472
                                      near 0.01
                                      far 1.0
                                    }
                                    
                                    HingeJoint {
                                      jointParameters HingeJointParameters {
                                        axis 0.000013 0.000000 -1.000000
                                        anchor -0.020200 -0.024400 0.000000
                                      }
                                      device [
                                        RotationalMotor {
                                          name "6"
                                          maxVelocity 1.0
