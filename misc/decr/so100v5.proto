            }
          ]
          name "shoulder"
          boundingObject Mesh {
            url "assets/simplified/Rotation_Pitch.stl"
          }

        }
      }
    ]
    name IS name
    boundingObject Mesh {
      url "assets/simplified/Base.stl"
    }
    physics Physics {
      density 1
      mass 1.000000
      centerOfMass [ 0.000000 0.000000 0.000000 ]
      inertiaMatrix [
        2.000000e-02
        2.000000e-02
        2.000000e-02
