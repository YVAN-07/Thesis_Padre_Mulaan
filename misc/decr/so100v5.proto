# SO-ARM100 Proto - Optimized for Webots
# Visual meshes: Original detailed geometry
# Collision meshes: Simplified geometry for performance

PROTO so100v5 [
  field  SFVec3f     translation     0 0 0
  field  SFRotation  rotation        0 0 1 0
  field  SFString    name            "so100"
  field  SFString    controller      "so_arm100_controller"
  field  MFString    controllerArgs  []
  field  SFString    customData      ""
  field  SFBool      supervisor      FALSE
  field  SFBool      synchronization TRUE
  field  SFBool      selfCollision   TRUE
]
{
  Robot {
    translation IS translation
    rotation IS rotation
    controller IS controller
    controllerArgs IS controllerArgs
    customData IS customData
    supervisor IS supervisor
    synchronization IS synchronization
    selfCollision IS selfCollision
    children [
      # Base visuals (original detailed meshes)
      Shape {
        appearance DEF three_d_printed PBRAppearance {
          baseColor 1.000000 0.500000 0.000000
          roughness 0.800000
          metalness 1
        }
        geometry DEF Base Mesh {
          url "assets/Base.stl"
        }
      }
      Shape {
        appearance DEF sts3215 PBRAppearance {
          baseColor 0.300000 0.300000 0.500000
          roughness 0.800000
          metalness 1
        }
        geometry DEF Base_Motor Mesh {
          url "assets/Base_Motor.stl"
        }
      }
      
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 0.000000 0.000006 1.000000
          anchor 0.000000 -0.045200 0.016500
        }
        device [
          RotationalMotor {
            name "1"
            maxVelocity 1.0
            maxTorque 25.0
          }
          PositionSensor {
            name "sensor_1"
          }
